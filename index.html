<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Ads Tweaker — AI Creative Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <!-- Live starfield background -->
  <canvas id="starfield"></canvas>

  <div class="wrap">
    <!-- Header -->
    <div class="header">
      <h1>Ads Tweaker</h1>
      <div class="sub">AI-powered captions, images, and videos for creators. Fast, clean.</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tabBtn active" id="tab-caption" type="button">Captions</button>
      <button class="tabBtn" id="tab-image" type="button">Images</button>
      <button class="tabBtn" id="tab-video" type="button">Videos</button>
    </div>

    <!-- Progress Bar -->
    <div id="prog" class="progWrap">
      <div id="progBar" class="progBar"></div>
    </div>
    <div id="progLabel" class="progLabel hidden"></div>

    <!-- Tab Content Container -->
    <div id="tabContent"></div>
  </div>

  <!-- Scripts -->
  <script src="/static/starfield.js"></script>
  <script src="/static/shared.js"></script>
  <script>
    // Load default tab on page load
    switchTab("caption");
  </script>
</body>
</html>
